  <script>
  (function () {
    const loadingEl = document.getElementById('sbPostLoading');
    const errorEl = document.getElementById('sbPostError');
    const postEl = document.getElementById('sbPost');
    const titleEl = document.getElementById('sbPostTitle');
    const dateEl = document.getElementById('sbPostDate');
    const warningsEl = document.getElementById('sbWarnings');
    const contentEl = document.getElementById('sbPostContent');
    const footerEl = document.getElementById('sbPostFooter');
    const shareBtn = document.getElementById('sbShareBtn');

    function escapeHtml(str) {
      return String(str ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function formatDate(iso) {
      try {
        return new Date(iso).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
      } catch (_) {
        return iso;
      }
    }

    function getSlug() {
      const params = new URLSearchParams(window.location.search);
      return (params.get('slug') || '').trim();
    }

    async function loadPost() {
      const slug = getSlug();
      if (!slug) {
        loadingEl.hidden = true;
        errorEl.textContent = 'No post slug provided. Please navigate from the blog list.';
        errorEl.hidden = false;
        return;
      }

      try {
        const res = await fetch(`/api/supabase-blog/post?slug=${encodeURIComponent(slug)}`);
        if (res.status === 404) {
          loadingEl.hidden = true;
          errorEl.textContent = 'Post not found.';
          errorEl.hidden = false;
          return;
        }
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const { post } = await res.json();

        // Update page meta
        document.title = `${post.title} — COOLmanYT`;
        const metaDesc = document.querySelector('meta[name="description"]');
        if (metaDesc) metaDesc.setAttribute('content', post.title);

        titleEl.textContent = post.title;

        const dateStr = formatDate(post.created_at);
        dateEl.textContent = dateStr;
        dateEl.setAttribute('datetime', post.created_at);

        // Warnings (rendered ABOVE content)
        if (Array.isArray(post.warnings) && post.warnings.length > 0) {
          warningsEl.innerHTML = post.warnings
            .map((w) => `<div class="sb-warning" role="note">⚠️ <span>${escapeHtml(w)}</span></div>`)
            .join('');
          warningsEl.hidden = false;
        }

        // Content — already sanitised server-side
        contentEl.innerHTML = post.contentHtml;

        const updatedStr = post.updated_at !== post.created_at
          ? `Updated ${formatDate(post.updated_at)}`
          : `Published ${dateStr}`;
        footerEl.textContent = updatedStr;

        shareBtn.addEventListener('click', async () => {
          const url = window.location.href;
          try {
            if (navigator.clipboard) {
              await navigator.clipboard.writeText(url);
              shareBtn.textContent = 'Link copied!';
              setTimeout(() => { shareBtn.textContent = 'Share'; }, 2000);
            }
          } catch (_) {
            shareBtn.textContent = 'Share';
          }
        });

        loadingEl.hidden = true;
        postEl.hidden = false;
      } catch (err) {
        loadingEl.hidden = true;
        errorEl.textContent = `Failed to load post: ${escapeHtml(err.message)}`;
        errorEl.hidden = false;
      }
    }

    loadPost();
  }());
  </script>
